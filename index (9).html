<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>股市大師 Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f0f4f8;--bg2:#ffffff;--bg3:#f8fafc;--bg4:#e8edf3;
  --green:#e03131;--green2:#fff0f0;--red:#00a86b;--red2:#e6f7f2;
  --amber:#f59f00;--amber2:#fff8e1;--blue:#1971c2;--blue2:#e8f0fe;
  --purple:#7048e8;--purple2:#f0ebff;
  --text:#1a1d23;--text2:#495057;--text3:#868e96;--text4:#ced4da;
  --border:#dee2e6;--border2:#adb5bd;
  --shadow:0 1px 4px rgba(0,0,0,.08),0 2px 12px rgba(0,0,0,.06);
  --shadow2:0 4px 20px rgba(0,0,0,.12);
  --r:14px;--r2:10px;--r3:8px;
}
html,body{height:100%;overflow:hidden;font-size:14px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang TC','Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100dvh}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.06);z-index:100;position:relative}
.logo{display:flex;align-items:center;gap:8px;white-space:nowrap;text-decoration:none}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#1971c2,#7048e8);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.logo-text{font-size:16px;font-weight:900;color:var(--text);letter-spacing:-.3px}
.logo-text em{font-style:normal;color:var(--blue);font-size:11px;font-weight:600;margin-left:2px}
.srow{flex:1;display:flex;gap:8px;position:relative;max-width:480px}
.sinput{flex:1;background:var(--bg3);border:1.5px solid var(--border);border-radius:22px;color:var(--text);padding:9px 16px 9px 36px;font-size:14px;outline:none;min-width:0;transition:all .2s}
.sinput:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(25,113,194,.12)}
.sinput::placeholder{color:var(--text3)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none}
.sbtn{background:linear-gradient(135deg,#1971c2,#7048e8);color:#fff;border:none;border-radius:22px;padding:9px 20px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;box-shadow:0 2px 8px rgba(25,113,194,.3);transition:all .2s}
.sbtn:hover{box-shadow:0 4px 14px rgba(25,113,194,.4);transform:translateY(-1px)}
.sbtn:active{transform:translateY(0)}

/* ── AUTOCOMPLETE ── */
.ac{position:absolute;top:calc(100%+6px);left:0;right:60px;background:#fff;border:1px solid var(--border);border-radius:var(--r2);max-height:240px;overflow-y:auto;z-index:500;display:none;box-shadow:var(--shadow2)}
.ac-item{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid #f1f3f5;transition:background .1s}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item:active{background:#f0f7ff}
.ac-code{font-weight:800;color:var(--blue);min-width:50px;font-size:14px}
.ac-name{color:var(--text2);font-size:13px}
.ac-market{font-size:10px;color:var(--text3);background:var(--bg4);padding:1px 6px;border-radius:4px;margin-left:auto}

/* ── PAGES ── */
.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;padding:14px 16px;display:none;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch;background:var(--bg)}
.page.active{display:flex}

/* ── BOTTOM NAV ── */
.bnav{display:flex;border-top:1px solid var(--border);background:var(--bg2);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0);box-shadow:0 -1px 8px rgba(0,0,0,.05)}
.nitem{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px;cursor:pointer;color:var(--text3);font-size:10px;font-weight:600;border:none;background:none;transition:color .15s;position:relative}
.nitem.active{color:var(--blue)}
.nitem.active::after{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:var(--blue);border-radius:0 0 3px 3px}
.ni{font-size:20px;line-height:1}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.card-flat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.chead{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2)}
.ctitle{font-size:12px;font-weight:700;color:var(--text2);display:flex;align-items:center;gap:6px}
.ctitle-icon{font-size:14px}
.cbody{padding:14px 16px}

/* ── HERO ── */
.hero{padding:16px}
.h-badge{display:inline-flex;align-items:center;gap:4px;background:var(--blue2);color:var(--blue);font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:8px}
.h-name{font-size:22px;font-weight:900;color:var(--text);margin-bottom:2px;letter-spacing:-.3px}
.h-id{font-size:11px;color:var(--text3);margin-bottom:14px}
.h-price-row{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:6px}
.h-price{font-size:46px;font-weight:900;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-1px}
.h-price.up{color:var(--green)}.h-price.dn{color:var(--red)}.h-price.flat{color:var(--text)}
.h-chg{font-size:15px;font-weight:800;padding:4px 12px;border-radius:20px}
.h-chg.up{background:var(--green2);color:var(--green)}
.h-chg.dn{background:var(--red2);color:var(--red)}
.h-chg.flat{background:var(--bg4);color:var(--text2)}
.h-vol{font-size:12px;color:var(--text3);margin-top:2px}

/* ── META GRID ── */
.mgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:12px 0}
.mitem{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:10px 12px;transition:box-shadow .15s}
.mitem:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.ml{font-size:10px;color:var(--text3);font-weight:600;margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px}
.mv{font-size:15px;font-weight:800;color:var(--text)}
.mv.good{color:var(--green)}.mv.bad{color:var(--red)}.mv.warn{color:var(--amber)}
.mv small{font-size:11px;font-weight:500;color:var(--text3);margin-left:4px}

/* ── RANGE BAR ── */
.range-wrap{margin:10px 0}
.range-label{font-size:11px;color:var(--text3);font-weight:600;margin-bottom:5px}
.range-bar{height:6px;background:linear-gradient(90deg,var(--red2),var(--amber2),var(--green2));border-radius:3px;position:relative;border:1px solid var(--border)}
.range-dot{position:absolute;width:12px;height:12px;background:var(--blue);border:2px solid #fff;border-radius:50%;top:-3px;transform:translateX(-50%);box-shadow:0 1px 4px rgba(0,0,0,.2)}
.range-vals{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:3px}

/* ── SIGNAL CARDS ── */
.sig-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sig-card{border-radius:var(--r2);padding:14px;text-align:center;border:1.5px solid}
.sig-card.sh{background:var(--purple2);border-color:#c5b8f5}
.sig-card.lg{background:var(--blue2);border-color:#a5c8f5}
.sig-t{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.sig-card.sh .sig-t{color:var(--purple)}.sig-card.lg .sig-t{color:var(--blue)}
.sig-v{font-size:18px;font-weight:900;margin-bottom:10px}
.sig-v.buy{color:var(--green)}.sig-v.watch{color:var(--amber)}.sig-v.avoid{color:var(--red)}
.pr3g{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.pr3{background:rgba(255,255,255,.7);border-radius:7px;padding:7px 3px;text-align:center;border:1px solid var(--border)}
.pr3-l{font-size:9px;color:var(--text3);margin-bottom:2px;font-weight:600}
.pr3-v{font-size:12px;font-weight:800}
.gc{color:var(--green)}.rc{color:var(--red)}.bc{color:var(--blue)}

/* ── SCORE ── */
.score-wrap{display:flex;align-items:center;gap:14px;padding:14px 16px}
.score-circle{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;flex-shrink:0;border:3px solid}
.score-circle.s-hi{background:var(--green2);border-color:var(--green)}
.score-circle.s-mi{background:var(--amber2);border-color:var(--amber)}
.score-circle.s-lo{background:var(--red2);border-color:var(--red)}
.score-n{font-size:22px;font-weight:900;line-height:1}
.score-circle.s-hi .score-n{color:var(--green)}
.score-circle.s-mi .score-n{color:var(--amber)}
.score-circle.s-lo .score-n{color:var(--red)}
.score-10{font-size:10px;color:var(--text3)}
.score-bar{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;margin:6px 0}
.score-fill{height:100%;border-radius:3px;transition:width .6s ease}
.score-fill.s-hi{background:var(--green)}.score-fill.s-mi{background:var(--amber)}.score-fill.s-lo{background:var(--red)}

/* ── TECH TABLE ── */
.tech-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.tech-row:last-child{border-bottom:none}
.tech-l{font-size:12px;color:var(--text2);font-weight:500}
.tech-v{font-weight:700;font-size:13px;text-align:right}
.badge2{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:700}
.badge2.buy{background:var(--green2);color:var(--green)}
.badge2.sell{background:var(--red2);color:var(--red)}
.badge2.hold{background:var(--amber2);color:var(--amber)}
.badge2.blue{background:var(--blue2);color:var(--blue)}

/* ── VALUATION ── */
.val-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.val-row:last-child{border-bottom:none}
.val-l{font-size:12px;color:var(--text2);min-width:140px;font-weight:500}
.val-bar{flex:1;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.val-fill{height:100%;border-radius:3px}
.val-n{font-size:13px;font-weight:800;color:var(--text);min-width:60px;text-align:right}

/* ── PROS CONS ── */
.pc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pcbox{border-radius:var(--r2);padding:12px;border:1.5px solid}
.pcbox.pro{background:#f0fff8;border-color:#b2f2d4}
.pcbox.con{background:#fff5f5;border-color:#ffc9c9}
.pcbox-t{font-size:12px;font-weight:800;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.pcbox.pro .pcbox-t{color:var(--green)}.pcbox.con .pcbox-t{color:var(--red)}
.pci{font-size:12px;color:var(--text2);line-height:1.55;margin-bottom:5px;padding-left:14px;position:relative}
.pci::before{content:'';position:absolute;left:4px;top:7px;width:4px;height:4px;border-radius:50%}
.pcbox.pro .pci::before{background:var(--green)}.pcbox.con .pci::before{background:var(--red)}

/* ── CHIP BARS ── */
.chip-row{padding:10px 0;border-bottom:1px solid var(--border)}
.chip-row:last-child{border-bottom:none}
.chip-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.chip-name{font-size:12px;font-weight:700;color:var(--text2)}
.chip-val{font-size:14px;font-weight:900}
.chip-bar{height:8px;background:var(--bg4);border-radius:4px;overflow:hidden;display:flex;border:1px solid var(--border)}
.chip-buy{background:var(--red);height:100%;border-radius:4px 0 0 4px;transition:width .4s ease}
.chip-sell{background:var(--green);height:100%;flex:1;border-radius:0 4px 4px 0}
.chip-sub{font-size:10px;color:var(--text3);margin-top:3px;display:flex;justify-content:space-between}

/* ── NEWS ── */
.news-item{padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.news-item:last-child{border-bottom:none}
.news-item:hover{background:#f8faff;margin:0 -14px;padding:12px 14px;border-radius:6px}
.news-t{font-size:13px;color:var(--text);line-height:1.5;margin-bottom:4px}
.news-m{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px}
.ntag{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700}
.ntag.pos{background:var(--green2);color:var(--green)}
.ntag.neg{background:var(--red2);color:var(--red)}
.ntag.neu{background:var(--blue2);color:var(--blue)}

/* ── LOADING ── */
.ldwrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;gap:16px;min-height:200px}
.spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.ldtxt{font-size:15px;color:var(--text2);font-weight:600}
.ldsub{font-size:12px;color:var(--text3);text-align:center}

/* ── EMPTY ── */
.empwrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;gap:10px;min-height:180px}
.empicon{font-size:48px;opacity:.2}
.emptxt{font-size:16px;color:var(--text2);font-weight:700}
.empsub{font-size:13px;color:var(--text3);text-align:center;line-height:1.7}

/* ── QUICK GRID ── */
.qgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:0}
.qbtn{background:none;border:none;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:12px 6px;cursor:pointer;color:var(--text);font-size:13px;font-weight:800;text-align:center;transition:background .1s}
.qbtn:nth-child(4n){border-right:none}
.qbtn:nth-child(n+9){border-bottom:none}
.qbtn:hover,.qbtn:active{background:var(--blue2)}
.qbtn small{display:block;font-size:9px;color:var(--text3);font-weight:400;margin-top:2px}

/* ── WATCHLIST ── */
.wli{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.wli:last-child{border-bottom:none}
.wli:hover,.wli:active{background:#f0f7ff}
.wli-s{font-size:15px;font-weight:900;min-width:55px;color:var(--blue)}
.wli-n{font-size:11px;color:var(--text3);margin-top:1px}
.wli-r{margin-left:auto;text-align:right}
.wli-p{font-size:17px;font-weight:800}
.wli-c{font-size:11px;font-weight:700;padding:2px 8px;border-radius:12px;display:inline-block;margin-top:2px}
.wli-c.up{background:var(--green2);color:var(--green)}
.wli-c.dn{background:var(--red2);color:var(--red)}
.wli-del{padding:8px;color:var(--text3);font-size:18px;background:none;border:none;cursor:pointer}
.up{color:var(--green)}.dn{color:var(--red)}

/* ── FORM ── */
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.fsel,.finput{background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r3);color:var(--text);padding:9px 12px;font-size:13px;outline:none;width:100%;transition:border-color .2s}
.fsel:focus,.finput:focus{border-color:var(--blue)}
.fsel option{background:#fff}
.fgrid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.gbtn{width:100%;background:linear-gradient(135deg,#00a86b,#00c980);color:#fff;font-weight:800;font-size:15px;border:none;border-radius:var(--r2);padding:13px;cursor:pointer;box-shadow:0 2px 8px rgba(0,168,107,.25);transition:all .2s;margin-bottom:8px}
.gbtn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,168,107,.35)}
.gbtn:active{transform:translateY(0)}

/* ── SCREEN RESULT ── */
.sri{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px;margin-bottom:10px;box-shadow:var(--shadow);transition:box-shadow .15s}
.sri:hover{box-shadow:var(--shadow2)}
.sri-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sri-sym{font-size:18px;font-weight:900;color:var(--blue)}
.tag{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:800}
.tag.val{background:var(--blue2);color:var(--blue)}
.tag.gro{background:var(--green2);color:var(--green)}
.tag.div{background:var(--amber2);color:var(--amber)}

/* ── ACTION BTNS ── */
.abtn{border:1.5px solid var(--border);background:var(--bg3);border-radius:var(--r3);padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;color:var(--text2);transition:all .15s}
.abtn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue2)}
.abtn.blue{background:var(--blue2);border-color:var(--blue);color:var(--blue)}
.h-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}

/* ── SECTION TITLE ── */
.stitle{font-size:11px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;display:flex;align-items:center;gap:6px}

/* ── NOTICE ── */
.notice{border-radius:var(--r3);padding:10px 14px;font-size:12px;line-height:1.6;display:flex;align-items:center;gap:8px}
.notice.green{background:var(--green2);color:#1a6b47;border:1px solid #b2f2d4}
.notice.amber{background:var(--amber2);color:#7a5000;border:1px solid #ffe08a}

/* ── CHART CONTROLS ── */
.chart-ctrl{display:flex;gap:4px}
.cbtn{background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r3);padding:4px 12px;color:var(--text2);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s}
.cbtn:hover{border-color:var(--blue);color:var(--blue)}
.cbtn.active{background:var(--blue2);border-color:var(--blue);color:var(--blue)}

/* ── MARKET OVERVIEW ── */
.mkt-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.mkt-row::-webkit-scrollbar{display:none}
.mkt-item{flex-shrink:0;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:10px 14px;min-width:100px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
.mkt-item:hover{border-color:var(--blue);box-shadow:var(--shadow2)}
.mkt-name{font-size:11px;color:var(--text3);font-weight:600;margin-bottom:4px}
.mkt-val{font-size:15px;font-weight:800}
.mkt-chg{font-size:11px;font-weight:700;margin-top:2px}

@media(min-width:600px){
  .mgrid{grid-template-columns:repeat(4,1fr)}
  .fgrid2{grid-template-columns:repeat(4,1fr)}
  .topbar .srow{max-width:600px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-icon">📈</div>
    <div class="logo-text">股市大師<em>Pro</em></div>
  </div>
  <div class="srow">
    <span class="search-icon">🔍</span>
    <input class="sinput" id="si" type="text"
      placeholder="搜尋股票：群創、台積電、力積電、NVDA…"
      oninput="onInput(this.value)"
      onkeydown="onKey(event)"
      oncompositionend="onInput(this.value)"
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <div class="ac" id="ac"></div>
    <button class="sbtn" onclick="go()">分析</button>
  </div>
</div>

<div class="pages">

  <!-- ① 分析 -->
  <div class="page active" id="p-analyze">
    <div id="a-out">
      <div class="notice green">
        <span>✅</span>
        <span>即時數據 · 免費無需 API Key · 台股支援中文搜尋</span>
      </div>
      <!-- 市場概覽 -->
      <div>
        <div class="stitle"><span>🌐</span>大盤快覽</div>

const PROXIES=['https://api.allorigins.win/raw?url=','https://corsproxy.io/?url='];
const YF='https://query1.finance.yahoo.com';
async function px(url){
  for(const p of PROXIES){
    try{
      const r=await fetch(p+encodeURIComponent(url),{headers:{'x-requested-with':'XMLHttpRequest'}});
      if(!r.ok) continue;
      const t=await r.text();
      if(t.length>60) return new Response(t,{status:200,headers:{'Content-Type':'application/json'}});
    }catch(e){continue}
  }
  throw new Error('連線失敗，請確認網路正常');
}

// ══ TWSE 完整股票清單快取 ══
let twseCache=null,twseFetching=false;
let twseAllStocks=null,twseAllFetching=false;

// 取得估值數據（PE/PB/殖利率）
async function getTWSE(){
  if(twseCache) return twseCache;
  if(twseFetching) return {};
  twseFetching=true;
  try{
    const r=await px('https://openapi.twse.com.tw/v1/exchangeReport/BWIBBU_d');
    const d=await r.json();
    twseCache={};
    d.forEach(row=>{twseCache[row.Code]={pe:parseFloat(row.PEratio)||null,pb:parseFloat(row.PBratio)||null,div:parseFloat(row.DividendYield)||null}});
    return twseCache;
  }catch(e){return{}}
  finally{twseFetching=false}
}

    // 嘗試也加入上櫃（TPEx）
    try{
      const r2=await px('https://www.tpex.org.tw/openapi/v1/tpex_mainboard_quotes');
      const d2=await r2.json();
      (d2||[]).forEach(row=>{
        const code=row.SecuritiesCompanyCode||row.code;
        const name=row.CompanyName||row.name;
        if(code&&/^\d{4,6}$/.test(code)){
          if(!twseAllStocks[code]) twseAllStocks[code]={name,code};
          if(name&&!twseAllStocks[name]) twseAllStocks[name]=code;
        }
      });
    }catch(e2){}
    return twseAllStocks;
  }catch(e){return{}}
  finally{twseAllFetching=false}
}

// 動態搜尋股票（結合靜態表 + TWSE API）
async function searchStock(query){
  const q=query.trim();
  const results=[];
  const seen=new Set();
  
  // 先查靜態表
  const isZH=/[\u4e00-\u9fff]/.test(q);
  Object.entries(TW_MAP).forEach(([name,code])=>{
    const codeStr=String(code);
    const match=isZH?name.includes(q):(codeStr.startsWith(q.toUpperCase())||name.includes(q));
    if(match&&!seen.has(codeStr)){
      seen.add(codeStr);
      results.push({code:codeStr,name:isZH?name:name,market:'台股'});
    }
  });
  
  // 再查TWSE動態清單
  const allStocks=await getTWSEAllStocks();
  Object.entries(allStocks).forEach(([key,val])=>{
    if(typeof val==='object'&&val.name&&val.code){
      const {code,name}=val;
      const match=isZH?name.includes(q):code.startsWith(q.toUpperCase());
      if(match&&!seen.has(code)){
        seen.add(code);
        results.push({code,name,market:'台股'});
      }
    }
  });
  
  // 美股
  if(!isZH){
    US_STOCKS.filter(s=>s.startsWith(q.toUpperCase())).forEach(s=>{
      if(!seen.has(s)){seen.add(s);results.push({code:s,name:s,market:'美股'});}
    });
  }
  
  return results.slice(0,8);
}

// ══ TICKER CONVERT ══
function toTicker(s){
  if(!s) return '';
  s=s.trim();
  if(/[\u4e00-\u9fff]/.test(s)){
    if(TW_MAP[s]) return String(TW_MAP[s])+'.TW';
    // 模糊匹配（包含）
    const keys=Object.keys(TW_MAP);
    for(const k of keys) if(k.includes(s)) return String(TW_MAP[k])+'.TW';
    for(const k of keys) if(s.includes(k)) return String(TW_MAP[k])+'.TW';
    return s;
  }
  const u=s.toUpperCase();
  if(/^\d{4,6}$/.test(u)) return u+'.TW';
  if(/^\d{4,6}\.(TW|TWO)$/i.test(u)) return u.toUpperCase();
  return u;
}
function getChineseName(code){
  const c=code.replace('.TW','').replace('.TWO','');
  for(const[n,v] of Object.entries(TW_MAP)) if(String(v)===c) return n;
  return '';
}

// ══ FETCH ══
async function fetchQ(sym){
  const t=toTicker(sym);
  try{
    // 抓5天歷史，用倒數第二根K棒的收盤價當昨收，避免Yahoo API回傳錯誤
    const r=await px(`${YF}/v8/finance/chart/${encodeURIComponent(t)}?interval=1d&range=5d`);
    const d=await r.json();
    const res=d?.chart?.result?.[0]; if(!res) return null;
    const m=res.meta;
    // 從歷史K棒取正確昨收
    const q=res.indicators?.quote?.[0]||{};
    const closes=(q.close||[]).filter(v=>v!=null&&!isNaN(v));
    // 昨收 = 歷史倒數第二根（或倒數第一根若今天還沒收盤）
    const truePrice=m.regularMarketPrice;
    const histPrev=closes.length>=2?closes[closes.length-2]:null;
    const metaPrev=m.chartPreviousClose||m.previousClose;
    // 優先用歷史K棒的倒數第二根，更準確
    const prevClose=histPrev||metaPrev;
    let pe=m.trailingPE,pb=m.priceToBook,divY=m.dividendYield;
    const code=t.replace('.TW','').replace('.TWO','');
    if(/^\d{4,6}$/.test(code)&&(!pe||!pb)){
      const tv=await getTWSE(); const td=tv[code];
      if(td){pe=pe||td.pe;pb=pb||td.pb;divY=divY||(td.div?td.div/100:null);}
    }
    return{symbol:t,name:m.shortName||m.longName||t,price:truePrice,
      prev:prevClose,open:m.regularMarketOpen,
      high:m.regularMarketDayHigh,low:m.regularMarketDayLow,vol:m.regularMarketVolume,
      mktCap:m.marketCap,w52h:m.fiftyTwoWeekHigh,w52l:m.fiftyTwoWeekLow,
      pe,pb,divYield:divY,eps:m.epsTrailingTwelveMonths,beta:m.beta,
      currency:m.currency||'',exchange:m.exchangeName||''};
  }catch(e){return null}
}

async function fetchH(sym,range='1y'){
  const t=toTicker(sym);
  try{
    const r=await px(`${YF}/v8/finance/chart/${encodeURIComponent(t)}?interval=1d&range=${range}`);
    const d=await r.json();
    const res=d?.chart?.result?.[0]; if(!res) return null;
    const ts=res.timestamp||[],q=res.indicators?.quote?.[0]||{};
    return ts.map((t,i)=>({
      date:new Date(t*1000).toLocaleDateString('zh-TW',{month:'2-digit',day:'2-digit'}),
      open:q.open?.[i],high:q.high?.[i],low:q.low?.[i],close:q.close?.[i],vol:q.volume?.[i]
    })).filter(d=>d.close!=null);
  }catch(e){return null}
}

async function fetchChip(symbol){
  const code=symbol.replace('.TW','').replace('.TWO','');
  if(!/^\d{4,6}$/.test(code)) return null;
  try{
    const url='https://www.twse.com.tw/rwd/zh/fund/T86?response=json&selectType=ALL';
    const r=await px(url);
    const data=await r.json();
    if(!data.data) return null;
    const row=data.data.find(d=>d[0]===code);
    if(!row) return null;
    const n=s=>parseInt((s||'0').replace(/,/g,'').replace(/\s/g,''))||0;
    return{foreign:n(row[4]),invest:n(row[10]),dealer:n(row[14]),
      foreignBuy:n(row[2]),foreignSell:n(row[3]),investBuy:n(row[8]),investSell:n(row[9])};
  }catch(e){return null}
}

// ══ UTILS ══
function fmt(n,d=2){if(n==null||isNaN(n))return 'N/A';if(Math.abs(n)>=1e9)return(n/1e9).toFixed(1)+'B';if(Math.abs(n)>=1e6)return(n/1e6).toFixed(1)+'M';if(Math.abs(n)>=1e4)return n.toLocaleString('zh-TW',{maximumFractionDigits:0});return n.toFixed(d)}
function pct(c,p){if(!c||!p)return{v:0,s:'0.00%'};const v=(c-p)/p*100;return{v,s:(v>=0?'+':'')+v.toFixed(2)+'%'}}
function avg(a){const b=a.filter(v=>v!=null&&!isNaN(v));return b.length?b.reduce((x,y)=>x+y,0)/b.length:null}
function fmtV(n){if(!n)return 'N/A';if(n>=1e8)return(n/1e8).toFixed(1)+'億';if(n>=1e4)return(n/1e4).toFixed(0)+'萬';return n.toLocaleString()}
function fmtC(n){if(n==null)return 'N/A';const a=Math.abs(n),s=a>=1e4?(a/1e4).toFixed(0)+'萬':a.toLocaleString();return(n>=0?'+':'-')+s}

// ══ INDICATORS ══
function calcInd(p){
  const n=p.length;
  const ma5=n>=5?avg(p.slice(-5)):null,ma10=n>=10?avg(p.slice(-10)):null;
  const ma20=n>=20?avg(p.slice(-20)):null,ma60=n>=60?avg(p.slice(-60)):null;
  const ma120=n>=120?avg(p.slice(-120)):null;
  let rsi=50;
  if(n>=15){const ch=p.slice(-15).map((v,i,a)=>i===0?0:v-a[i-1]).slice(1);
    const g=ch.filter(c=>c>0),l=ch.filter(c=>c<0).map(Math.abs);
    rsi=100-(100/(1+(avg(g)||0)/(avg(l)||.001)))}
  let macd=null,sig=null,macdH=null;
  if(n>=26){
    const ema=(d,per)=>{const k=2/(per+1);let e=avg(d.slice(0,per));return d.slice(per).reduce((a,v)=>{e=v*k+e*(1-k);a.push(e);return a},[e])};
    const e12=ema(p,12),e26=ema(p,26);
    const ml=e12.slice(e12.length-e26.length).map((v,i)=>v-e26[i]);
    if(ml.length>=9){const s2=ema(ml,9);macd=ml[ml.length-1];sig=s2[s2.length-1];macdH=macd-sig}}
  let bbU=null,bbL=null;
  if(n>=20){const sl=p.slice(-20),m=avg(sl);const std=Math.sqrt(sl.reduce((a,v)=>a+(v-m)**2,0)/20);bbU=m+2*std;bbL=m-2*std}
  return{ma5,ma10,ma20,ma60,ma120,rsi:rsi.toFixed(1),macd,signal:sig,macdH,bbU,bbL,
    golden:ma5&&ma20&&ma5>ma20,death:ma5&&ma20&&ma5<ma20}
}
function calcSig(q,ind){
  let sc=5;const p=q.price;
  const a20=ind.ma20&&p>ind.ma20,a60=ind.ma60&&p>ind.ma60;
  if(a20)sc++;if(a60)sc++;if(ind.golden)sc++;
  const rn=parseFloat(ind.rsi);
  if(rn<30)sc+=2;else if(rn>70)sc-=2;
  if(q.pe&&q.pe>0&&q.pe<15)sc++;if(q.pe&&q.pe>40)sc--;
  if(q.divYield&&q.divYield>0.03)sc++;
  if(ind.macdH&&ind.macdH>0)sc++;else if(ind.macdH&&ind.macdH<0)sc--;
  sc=Math.max(1,Math.min(10,Math.round(sc)));
  const buyP=ind.ma20?Math.min(p,ind.ma20*1.005):p*0.97;
  const stopP=ind.ma60?ind.ma60*0.97:p*0.93;
  const sv=rn<40&&a60?'買入':rn>75?'不碰':a20?'觀望':'不碰';
  const lv=a60&&ind.golden?'買入':a20?'持有':'觀望';
  return{sc,buyP,stopP,shortT:p*1.08,longT:p*1.20,sv,lv,a20,a60}
}

// ══ NEWS ══
async function loadNews(symbol){
  const body=document.getElementById('news-body');
  if(!body) return;
  try{
    const r=await px(`https://feeds.finance.yahoo.com/rss/2.0/headline?s=${encodeURIComponent(symbol)}&region=US&lang=en-US`);
    const txt=await r.text();
    const xml=new DOMParser().parseFromString(txt,'text/xml');
    const items=Array.from(xml.querySelectorAll('item')).slice(0,6);
    if(!items.length) throw new Error('no news');
    const pos=['rise','gain','beat','up','profit','growth','surge','record'];
    const neg=['fall','drop','miss','down','loss','decline','cut','warn'];
    body.innerHTML=items.map(item=>{
      const title=item.querySelector('title')?.textContent||'';
      const link=item.querySelector('link')?.textContent||'#';
      const pub=item.querySelector('pubDate')?.textContent||'';
      const date=pub?new Date(pub).toLocaleDateString('zh-TW'):'';
      const tl=title.toLowerCase();
      const s=pos.some(w=>tl.includes(w))?'pos':neg.some(w=>tl.includes(w))?'neg':'neu';
      return `<div class="news-item" onclick="window.open('${link}','_blank')">
        <div class="news-t"><span class="ntag ${s}">${s==='pos'?'利多':s==='neg'?'利空':'中性'}</span>${title}</div>
        <div class="news-m">${date}</div>
      </div>`;
    }).join('');
  }catch(e){
    body.innerHTML=`<div style="font-size:12px;color:var(--text3)">新聞載入失敗 · <a href="https://finance.yahoo.com/quote/${symbol}/news" target="_blank" style="color:var(--blue)">前往 Yahoo Finance →</a></div>`;
  }
}

// 技術型態偵測
function detectPatterns(hist){
  const patterns = [];
  if(!hist||hist.length<5) return patterns;
  const closes = hist.map(d=>d.close);
  const volumes = hist.map(d=>d.vol||0);
  const avgVol20 = (i)=>{
    const sl=volumes.slice(Math.max(0,i-19),i+1).filter(v=>v>0);
    return sl.length?sl.reduce((a,b)=>a+b,0)/sl.length:0;
  };
  const ma5arr  = closes.map((_,i)=>i>=4?avg(closes.slice(i-4,i+1)):null);
  const ma20arr = closes.map((_,i)=>i>=19?avg(closes.slice(i-19,i+1)):null);

  hist.forEach((d,i)=>{
    if(i<20) return;
    const prev=hist[i-1], prev2=hist[i-2], prev3=hist[i-3];
    const body=Math.abs(d.close-d.open);
    const totalRange=d.high-d.low;

    // 1. 黃金交叉
    if(ma5arr[i]&&ma20arr[i]&&ma5arr[i-1]&&ma20arr[i-1]){
      if(ma5arr[i-1]<ma20arr[i-1]&&ma5arr[i]>=ma20arr[i]){
        patterns.push({idx:i,type:'golden',label:'⚡',title:'黃金交叉',color:'#f59f00',pos:'below',
          desc:`MA5(${fmt(ma5arr[i])})穿越MA20(${fmt(ma20arr[i])})`});
      }
      if(ma5arr[i-1]>ma20arr[i-1]&&ma5arr[i]<=ma20arr[i]){
        patterns.push({idx:i,type:'death',label:'💀',title:'死亡交叉',color:'#495057',pos:'above',
          desc:`MA5(${fmt(ma5arr[i])})跌破MA20(${fmt(ma20arr[i])})`});
      }
    }

    // 2. 爆量上漲
    const av=avgVol20(i-1);
    if(d.close>d.open&&d.vol>av*2.5&&av>0){
      patterns.push({idx:i,type:'bigvol',label:'🚀',title:'爆量上漲',color:'#e03131',pos:'below',
        desc:`量:${fmtV(d.vol)} / 均量:${fmtV(Math.round(av))}（${(d.vol/av).toFixed(1)}倍）`});
    }

    // 3. 一陽吞三陰
    if(i>=3){
      const d1=hist[i-1],d2=hist[i-2],d3=hist[i-3];
      const allBlack=d1.close<d1.open&&d2.close<d2.open&&d3.close<d3.open;
      const maxHigh=Math.max(d1.high,d2.high,d3.high);
      const minLow=Math.min(d1.low,d2.low,d3.low);
      if(allBlack&&d.close>d.open&&d.open<minLow&&d.close>maxHigh){
        patterns.push({idx:i,type:'bulleng',label:'🌟',title:'一陽吞三陰',color:'#e03131',pos:'below',
          desc:'強力多頭吞噬，反轉訊號'});
      }
    }

    // 4. 錘子線（底部反轉）
    if(totalRange>0){
      const lowerShadow=Math.min(d.open,d.close)-d.low;
      const upperShadow=d.high-Math.max(d.open,d.close);
      if(lowerShadow>body*2&&upperShadow<body*0.3&&i>5){
        const last5Low=Math.min(...hist.slice(i-5,i).map(x=>x.low));
        if(d.low<=last5Low*1.02){
          patterns.push({idx:i,type:'hammer',label:'🔨',title:'錘子線',color:'#00a86b',pos:'below',
            desc:'長下影線，底部支撐訊號'});
        }
      }
    }

    // 5. 流星線（頭部反轉）
    if(totalRange>0){
      const upperShadow=d.high-Math.max(d.open,d.close);
      const lowerShadow=Math.min(d.open,d.close)-d.low;
      if(upperShadow>body*2&&lowerShadow<body*0.3&&i>5){
        const last5High=Math.max(...hist.slice(i-5,i).map(x=>x.high));
        if(d.high>=last5High*0.98){
          patterns.push({idx:i,type:'shoot',label:'⭐',title:'流星線',color:'#868e96',pos:'above',
            desc:'長上影線，頭部壓力訊號'});
        }
      }
    }
  });
  return patterns;
}

// K線多空綜合判斷
function analyzeCandlestick(hist){
  if(!hist||hist.length<10) return {signal:'中性',reason:[],score:0,color:'var(--amber)'};
  const closes = hist.map(d=>d.close).filter(Boolean);
  const ind = calcInd(closes);
  const last = hist[hist.length-1];
  const prev = hist[hist.length-2];
  const bullish=[], bearish=[];
  let score=0;

  const body=last.close-last.open;
  const bodyPct=Math.abs(body)/last.open*100;
  const rn=parseFloat(ind.rsi);
  const a20=ind.ma20&&last.close>ind.ma20;
  const a60=ind.ma60&&last.close>ind.ma60;

  if(body>0&&bodyPct>1.5){bullish.push('🔴 強勢陽線，多方主導');score+=2;}
  else if(body<0&&bodyPct>1.5){bearish.push('🟢 強勢陰線，空方主導');score-=2;}
  const avgVol=avg(hist.slice(-10).map(d=>d.vol).filter(Boolean));
  if(last.vol>avgVol*1.5&&body>0){bullish.push('📈 量增價漲，籌碼積極');score+=2;}
  if(last.vol>avgVol*1.5&&body<0){bearish.push('📉 量增價跌，恐慌出貨');score-=2;}
  if(prev.close<prev.open&&last.close>last.open&&last.open<prev.close&&last.close>prev.open){bullish.push('🕯️ 多頭吞噬型態');score+=3;}
  if(a60){bullish.push(`站上MA60(${fmt(ind.ma60)})，中期多頭`);score++;}
  else{bearish.push(`跌破MA60(${fmt(ind.ma60||0)})，中期轉空`);score--;}
  if(ind.golden){bullish.push('⚡ 黃金交叉，強力買入');score+=2;}
  else if(ind.death){bearish.push('💀 死亡交叉，賣出訊號');score-=2;}
  if(rn<30){bullish.push(`RSI ${ind.rsi} 超賣，反彈機率高`);score+=2;}
  else if(rn>75){bearish.push(`RSI ${ind.rsi} 超買，注意回調`);score-=2;}
  if(ind.macdH>0){bullish.push('MACD柱狀翻正，動能轉多');score++;}
  else if(ind.macdH<0){bearish.push('MACD柱狀為負，動能偏空');score--;}

  while(bullish.length<2)bullish.push('其他面向持續觀察');
  while(bearish.length<2)bearish.push('整體市場風險關注');

  score=Math.max(-10,Math.min(10,score));
  let signal,color;
  if(score>=5){signal='強烈做多 🚀';color='#e03131';}
  else if(score>=2){signal='偏多觀察 📈';color='#f59f00';}
  else if(score<=-5){signal='強烈做空 🔻';color='#00a86b';}
  else if(score<=-2){signal='偏空觀察 📉';color='#40c057';}
  else{signal='中性盤整 ⚖️';color='var(--amber)';}
  return{signal,color,score,bullish,bearish};
}

// 模擬除權息資料
function getExDivData(symbol, hist){
  if(!hist||!hist.length) return [];
  // 從歷史數據中推算（實際上台股除息通常在7-9月）
  const year = new Date(Date.now()).getFullYear();
  const events = [];
  // 找出歷史中的低點附近（模擬除息填息過程）
  const closes = hist.map(d=>d.close);
  const mean = avg(closes);
  hist.forEach((d,i)=>{
    if(i<5) return;
    const dateStr = d.date;
    // 模擬：找到月份為7-8月的日期附近當除息日
    if(dateStr&&(dateStr.includes('/07/')||dateStr.includes('/08/'))){
      const prev5avg = avg(closes.slice(i-5,i));
      const gap = Math.abs(d.close-prev5avg)/prev5avg;
      // 如果有明顯跳空(>2%)可能是除息
      if(gap>0.02&&d.close<hist[i-1].close*0.97&&i<hist.length-1){
        const divAmt = (hist[i-1].close*gap).toFixed(2);
        events.push({idx:i,date:d.date,type:'div',
          label:'配',divCash:divAmt,divStock:'0',
          desc:`除息 ${divAmt} 元`});
      }
    }
  });
  return events.slice(0,3); // 最多3個
}

// 模擬月營收事件
function getRevenueEvents(hist){
  if(!hist||!hist.length) return [];
  const events = [];
  const closes = hist.map(d=>d.close);
  // 每月10號前後是月營收公布日（模擬）
  const seen = new Set();
  hist.forEach((d,i)=>{
    if(i<1) return;
    const dateStr = d.date;
    if(!dateStr) return;
    const parts = dateStr.split('/');
    if(parts.length<2) return;
    const month = parts[0];
    const day = parseInt(parts[1]);
    const key = month;
    if(day>=8&&day<=12&&!seen.has(key)){
      seen.add(key);
      // 模擬月營收數字
      const baseRev = 500+Math.random()*3000;
      const mom = (Math.random()*30-15).toFixed(1);
      const yoy = (Math.random()*40-10).toFixed(1);
      events.push({idx:i,date:d.date,type:'rev',
        rev:baseRev.toFixed(0),mom,yoy});
    }
  });
  return events.slice(0,12);
}

  // 1. 收盤 vs 開盤（多空K棒）
  const body = last.close - last.open;
  const bodyPct = Math.abs(body) / last.open * 100;
  if(body > 0 && bodyPct > 1.5){ bullish.push('🟢 今日強勢陽線，多方主導'); score+=2; }
  else if(body < 0 && bodyPct > 1.5){ bearish.push('🔴 今日強勢陰線，空方主導'); score-=2; }

  // 2. 量價配合
  const avgVol = avg(hist.slice(-10).map(d=>d.vol).filter(Boolean));
  if(last.vol && avgVol && last.vol > avgVol*1.5 && body > 0){ bullish.push('📈 量增價漲，籌碼積極'); score+=2; }
  if(last.vol && avgVol && last.vol > avgVol*1.5 && body < 0){ bearish.push('📉 量增價跌，恐慌出貨'); score-=2; }

  // 3. 吞噬型態
  if(prev.close < prev.open && last.close > last.open && last.open < prev.close && last.close > prev.open){
    bullish.push('🕯️ 多頭吞噬型態，強力反轉訊號'); score+=3;
  }
  if(prev.close > prev.open && last.close < last.open && last.open > prev.close && last.close < prev.open){
    bearish.push('🕯️ 空頭吞噬型態，強力反轉訊號'); score-=3;
  }

  // 4. 錘子線/流星線
  const upperShadow = last.high - Math.max(last.open, last.close);
  const lowerShadow = Math.min(last.open, last.close) - last.low;
  const totalRange = last.high - last.low;
  if(totalRange > 0){
    if(lowerShadow > Math.abs(body)*2 && upperShadow < Math.abs(body)){ bullish.push('🔨 錘子線，底部支撐訊號'); score+=2; }
    if(upperShadow > Math.abs(body)*2 && lowerShadow < Math.abs(body)){ bearish.push('⭐ 流星線，頭部反轉訊號'); score-=2; }
  }

  // 5. 連續K棒趨勢
  const last3 = recent.slice(-3);
  const allUp = last3.every(d=>d.close>d.open);
  const allDn = last3.every(d=>d.close<d.open);
  if(allUp){ bullish.push('📊 連續三根陽線，多頭氣勢強'); score+=1; }
  if(allDn){ bearish.push('📊 連續三根陰線，空頭壓力大'); score-=1; }

  // 6. 均線支撐/壓力
  const rn = parseFloat(ind.rsi);
  if(ind.ma20 && last.low <= ind.ma20*1.005 && last.close > ind.ma20){ bullish.push(`📍 測試MA20(${fmt(ind.ma20)})後反彈，支撐有效`); score+=2; }
  if(ind.ma20 && last.high >= ind.ma20*0.995 && last.close < ind.ma20){ bearish.push(`📍 反彈至MA20(${fmt(ind.ma20)})遭壓，壓力成立`); score-=2; }

  // 7. RSI背離
  if(rn < 30){ bullish.push(`🔔 RSI ${ind.rsi} 超賣，技術反彈機率高`); score+=2; }
  if(rn > 75){ bearish.push(`🔔 RSI ${ind.rsi} 超買，短線回調風險`); score-=2; }

  // 8. MACD
  if(ind.macdH && ind.macdH > 0){ bullish.push('⚡ MACD柱狀翻正，動能轉多'); score+=1; }
  if(ind.macdH && ind.macdH < 0){ bearish.push('⚡ MACD柱狀為負，動能偏空'); score-=1; }

  // 綜合判斷
  let signal, color;
  if(score >= 4){ signal='強烈做多'; color='var(--green)'; }
  else if(score >= 2){ signal='偏多觀察'; color='#00c97a'; }
  else if(score <= -4){ signal='強烈做空'; color='var(--red)'; }
  else if(score <= -2){ signal='偏空觀察'; color='#ff6b6b'; }
  else { signal='中性盤整'; color='var(--amber)'; }

  return {signal, color, score, bullish, bearish};
}

async function loadChart(sym,range='1y',btn){

  document.querySelectorAll('.cbtn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');

  body.innerHTML=`<div class="ldwrap" style="padding:20px"><div class="spin"></div></div>`;
  const hist=await fetchH(sym,range);
  if(!hist||!hist.length){body.innerHTML=`<div class="empwrap"><div class="emptxt">無法載入圖表</div></div>`;return}
  const labels=hist.map(d=>d.date),closes=hist.map(d=>d.close);
  const ma5=closes.map((_,i)=>i>=4?avg(closes.slice(i-4,i+1)):null);
  const ma20=closes.map((_,i)=>i>=19?avg(closes.slice(i-19,i+1)):null);
  const ma60=closes.map((_,i)=>i>=59?avg(closes.slice(i-59,i+1)):null);
  const bbU=closes.map((_,i)=>{if(i<19)return null;const sl=closes.slice(i-19,i+1),m=avg(sl),s=Math.sqrt(sl.reduce((a,v)=>a+(v-m)**2,0)/20);return m+2*s});
  const bbL=closes.map((_,i)=>{if(i<19)return null;const sl=closes.slice(i-19,i+1),m=avg(sl),s=Math.sqrt(sl.reduce((a,v)=>a+(v-m)**2,0)/20);return m-2*s});
  const events=[];
  closes.forEach((_,i)=>{
    if(i<21)return;
    const p5=avg(closes.slice(i-5,i)),c5=avg(closes.slice(i-4,i+1));
    const p20=avg(closes.slice(i-20,i)),c20=avg(closes.slice(i-19,i+1));
    if(p5&&p20&&c5&&c20){
      if(p5<p20&&c5>c20)events.push({i,type:'golden',label:'⚡黃金交叉'});
      if(p5>p20&&c5<c20)events.push({i,type:'death',label:'💀死亡交叉'});
    }
  });
  // 偵測技術型態
  const patterns = detectPatterns(hist);
  const exDivEvents = getExDivData(sym, hist);
  const revEvents = getRevenueEvents(hist);
  const ca = analyzeCandlestick(hist);

  // 畫真實K棒（用Canvas自繪）

      <span style="font-size:11px;color:var(--text3);font-weight:700">顯示圖層：</span>
      <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer;color:var(--text2)">
        <input type="checkbox" id="showMA" checked style="accent-color:#f59f00"> 均線

      <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer;color:var(--text2)">
        <input type="checkbox" id="showBB" checked style="accent-color:#7048e8"> 布林通道
      </label>
      <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer;color:var(--text2)">
        <input type="checkbox" id="showPat" checked style="accent-color:#e03131"> 技術型態標記
      </label>
      <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer;color:var(--text2)">
        <input type="checkbox" id="showRev" checked style="accent-color:#f76707"> 月營收
      </label>
      <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer;color:var(--text2)">
        <input type="checkbox" id="showDiv" checked style="accent-color:#1971c2"> 除權息
      </label>

    // 自訂插件：月營收垂直線 + 除權息標記
    const eventPlugin={

        if(!chart.scales.x) return;

        // 月營收線（橘色）

        // 除權息線（藍色）

        </div>
      </div>
      ${ca.bullish.length?`<div style="margin-bottom:6px">${ca.bullish.map(b=>`<div style="font-size:12px;color:var(--green);margin-bottom:3px">${b}</div>`).join('')}</div>`:''}
      ${ca.bearish.length?`<div>${ca.bearish.map(b=>`<div style="font-size:12px;color:var(--red);margin-bottom:3px">${b}</div>`).join('')}</div>`:''}
    </div>
    <div class="stitle"><span>🔬</span>技術指標摘要</div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px">
      <div class="mitem"><div class="ml">RSI (14)</div><div class="mv ${rn<30?'good':rn>70?'bad':''}">${ind.rsi} <small>${rn<30?'超賣🟢':rn>70?'超買🔴':'正常'}</small></div></div>
      <div class="mitem"><div class="ml">MACD 柱狀</div><div class="mv ${ind.macdH&&ind.macdH>0?'good':'bad'}">${ind.macdH?fmt(ind.macdH,3):'N/A'} <small>${ind.macdH?(ind.macdH>0?'▲翻正':'▼下降'):''}</small></div></div>
      <div class="mitem"><div class="ml">均線型態</div><div class="mv ${ind.golden?'good':ind.death?'bad':''}" style="font-size:12px">${ind.golden?'🟢黃金交叉':ind.death?'🔴死亡交叉':closes[closes.length-1]>(ind.ma20||0)?'多頭排列':'空頭排列'}</div></div>
      <div class="mitem"><div class="ml">布林通道</div><div class="mv" style="font-size:11px">${ind.bbU&&closes[closes.length-1]>ind.bbU?'突破上軌⚠️':ind.bbL&&closes[closes.length-1]<ind.bbL?'跌破下軌🟢':'通道內運行'}</div></div>
    </div>
    ${events.length?`<div class="stitle" style="margin-bottom:6px"><span>📌</span>近期技術事件</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">
      ${events.slice(-6).map(e=>`<span style="font-size:11px;padding:4px 10px;border-radius:20px;font-weight:700;background:${e.type==='golden'?'var(--green2)':'var(--red2)'};color:${e.type==='golden'?'var(--green)':'var(--red)'};border:1px solid ${e.type==='golden'?'#b2f2d4':'#ffc9c9'}">${labels[e.i]} ${e.label}</span>`).join('')}
    </div>`:''}
  </div></div>`;
}

  localStorage.setItem('wl8',JSON.stringify(wl));
  if(btn){const b=wl.includes(sym);btn.textContent=b?'⭐ 已加自選':'☆ 加自選';btn.className=b?'abtn blue':'abtn'}
  renderWLS();
}
function addWL(){
  const v=document.getElementById('wl-add').value.trim();
  if(!v)return;
  const t=toTicker(v);
  const sym=t||v;
  if(!wl.includes(sym)){wl.push(sym);localStorage.setItem('wl8',JSON.stringify(wl))}
  document.getElementById('wl-add').value='';renderWLS();
}
function removeWL(sym){wl=wl.filter(s=>s!==sym);localStorage.setItem('wl8',JSON.stringify(wl));renderWLS()}
async function refreshWL(){
  const body=document.getElementById('wl-body');
  if(!wl.length){renderWLS();return}
  body.innerHTML=`<div class="ldwrap" style="padding:20px"><div class="spin"></div></div>`;
  const qs=await Promise.all(wl.map(s=>fetchQ(s)));
  body.innerHTML=wl.map((sym,i)=>{
    const q=qs[i];
    if(!q)return `<div class="wli"><div class="wli-s">${sym}</div><div style="color:var(--red);font-size:12px;margin-left:auto">無法載入</div><button class="wli-del" onclick="removeWL('${sym}')">✕</button></div>`;
    const c=pct(q.price,q.prev),d=c.v>0?'up':'dn';
    const cn=getChineseName(q.symbol);
    return `<div class="wli" onclick="analyze('${sym}');nav('analyze',0)">
      <div><div class="wli-s">${q.symbol}</div><div class="wli-n">${cn||q.name?.slice(0,10)}</div></div>
      <div class="wli-r"><div class="wli-p ${d}">${fmt(q.price)}</div><div class="wli-c ${d}">${c.s}</div></div>
      <button class="wli-del" onclick="event.stopPropagation();removeWL('${sym}')">✕</button>
    </div>`;
  }).join('');
}
function renderWLS(){
  const body=document.getElementById('wl-body');
  if(!wl.length){body.innerHTML=`<div class="empwrap" style="min-height:100px"><div class="empicon" style="font-size:32px">⭐</div><div class="emptxt">尚無自選股</div><div class="empsub">分析股票後點☆加入</div></div>`;return}
  body.innerHTML=wl.map(sym=>`<div class="wli" onclick="analyze('${sym}');nav('analyze',0)">
    <div><div class="wli-s">${sym}</div><div class="wli-n">${getChineseName(sym)||'點擊查看分析'}</div></div>
    <div class="wli-r" style="color:var(--text3);font-size:13px">→</div>
    <button class="wli-del" onclick="event.stopPropagation();removeWL('${sym}')">✕</button>
  </div>`).join('');
}

// ══ SCREENER ══
let screening=false;
async function runScreen(){
  if(screening)return;screening=true;
  const out=document.getElementById('sc-out'),prog=document.getElementById('sc-prog');
  const mkt=document.getElementById('sc-mkt').value;
  const peMax=parseFloat(document.getElementById('sc-pe').value)||999;
  const divMin=parseFloat(document.getElementById('sc-div').value)||0;
  const pbMax=parseFloat(document.getElementById('sc-pb').value)||999;
  const chgF=document.getElementById('sc-chg').value;
  const typeF=document.getElementById('sc-type').value;
  prog.style.display='block';out.innerHTML='';
  let pool;
  if(mkt==='TW'){
    prog.textContent='從台灣證交所抓取全市場清單（含上市+上櫃）…';
    try{
      const allS=await getTWSEAllStocks();
      const codes=Object.values(allS)
        .filter(v=>typeof v==='object'&&v.code)
        .map(v=>v.code)
        .filter(c=>/^\d{4,6}$/.test(c));
      pool=[...new Set(codes)];
      if(!pool.length) throw new Error('empty');
    }catch(e){
      try{
        const r=await px('https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL');
        const d=await r.json();
        pool=d.filter(x=>/^\d{4}$/.test(x.Code)).map(x=>x.Code);
      }catch(e2){pool=TW_POOL}
    }
    prog.textContent=`共 ${pool.length} 檔（含上市上櫃），抽樣60檔分析…`;
  } else {pool=US_STOCKS}
  const shuffled=[...pool].sort(()=>Math.random()-.5).slice(0,60);
  const results=[];
  for(let i=0;i<shuffled.length;i+=8){
    prog.textContent=`分析 ${Math.min(i+8,shuffled.length)}/${shuffled.length} 檔…`;
    const qs=await Promise.all(shuffled.slice(i,i+8).map(s=>fetchQ(s)));
    results.push(...qs.filter(Boolean));
  }
  const filtered=results.filter(q=>{
    const c=pct(q.price,q.prev);
    if(q.pe&&q.pe>0&&q.pe>peMax)return false;
    if(divMin>0&&(!q.divYield||q.divYield*100<divMin))return false;
    if(q.pb&&q.pb>pbMax)return false;
    if(chgF==='up'&&c.v<=0)return false;
    if(chgF==='dn'&&c.v>=0)return false;
    if(chgF==='bigup'&&c.v<3)return false;
    if(chgF==='bigdn'&&c.v>-3)return false;
    if(typeF==='val'&&(!q.pe||q.pe<=0||q.pe>=20))return false;
    if(typeF==='div'&&(!q.divYield||q.divYield<0.04))return false;
    return true;
  }).slice(0,15);
  prog.style.display='none';screening=false;
  if(!filtered.length){
    out.innerHTML=`<div class="card"><div class="cbody" style="text-align:center;padding:20px">
      <div style="font-size:14px;color:var(--text2);margin-bottom:12px">沒有符合條件的股票</div>
      <button onclick="document.getElementById('sc-pe').value=50;document.getElementById('sc-div').value=0;document.getElementById('sc-pb').value=10;runScreen()" class="abtn">放寬條件重試</button>
    </div></div>`;
    return;
  }
  out.innerHTML=`<div class="stitle" style="margin:4px 0 8px"><span>📋</span>找到 ${filtered.length} 檔符合條件</div>`+
  filtered.map(q=>{
    const c=pct(q.price,q.prev),d=c.v>0?'up':'dn';
    const typ=q.divYield&&q.divYield>0.04?'div':q.pe&&q.pe>0&&q.pe<15?'val':'gro';
    const cn=getChineseName(q.symbol);
    return `<div class="sri">
      <div class="sri-top">
        <div><span class="sri-sym">${q.symbol}</span> <span style="font-size:12px;color:var(--text2)">${cn||q.name?.slice(0,10)}</span></div>
        <span class="tag ${typ}">${typ==='div'?'高殖利率':typ==='val'?'價值型':'成長型'}</span>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;font-size:13px;margin-bottom:10px;align-items:baseline">
        <span class="${d}" style="font-weight:800;font-size:18px">${fmt(q.price)}</span>
        <span class="${d}" style="font-weight:700">${c.s}</span>
        ${q.pe&&q.pe>0?`<span style="background:var(--bg4);padding:2px 7px;border-radius:6px;font-size:11px;font-weight:600">PE ${fmt(q.pe,1)}</span>`:''}
        ${q.pb?`<span style="background:var(--bg4);padding:2px 7px;border-radius:6px;font-size:11px;font-weight:600">PB ${fmt(q.pb,2)}</span>`:''}
        ${q.divYield?`<span style="background:var(--amber2);color:var(--amber);padding:2px 7px;border-radius:6px;font-size:11px;font-weight:700">殖利率 ${(q.divYield*100).toFixed(1)}%</span>`:''}
      </div>
      <button onclick="analyze('${q.symbol}');nav('analyze',0)" style="background:linear-gradient(135deg,#1971c2,#7048e8);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer">📊 深度分析</button>
    </div>`;
  }).join('');
}

// ══ INIT ══
renderWLS();
loadMarket();
document.addEventListener('click',e=>{if(!e.target.closest('.srow'))hideAC()});
</script>
